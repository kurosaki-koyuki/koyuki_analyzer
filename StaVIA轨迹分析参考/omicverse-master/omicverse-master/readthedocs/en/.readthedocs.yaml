# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
#
# NOTE on build speed: the Sphinx phase (~620s) dominates this build and
# is CPU-bound on RTD's 1–2-core builders. `-j auto` was tested and gave
# no speedup (655s vs 626s — slightly worse from worker oversubscription),
# and a build-time figure downscaler cost more than it saved. The durable
# levers are (a) an RTD build-time-limit increase, (b) trimming the
# autodoc API page count, or (c) the GitHub Actions docs build. Keeping
# the standard single-threaded builder here — it is the fastest and most
# maintainable option on RTD's hardware.
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

submodules:
  include: all
  recursive: true

sphinx:
  configuration: omicverse_guide/docs/conf.py
  fail_on_warning: false

python:
  install:
  - requirements: requirements.txt
  - requirements: omicverse_guide/requirements.txt
